# Test profile configuration
# Note: Do not set spring.profiles.active here - it's set by @ActiveProfiles annotation

spring:
  # Use embedded H2 in PostgreSQL compatibility mode
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Initialize H2 with test schema
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

  # Disable Flyway for tests — schema is created via H2 init
  flyway:
    enabled: false

  # Disable Redis for tests
  data:
    redis:
      repositories:
        enabled: false

  # Use simple in-memory cache for tests
  cache:
    type: simple

# Disable gRPC server in tests
grpc:
  server:
    port: -1  # Disables gRPC server

# Disable actuator endpoints in tests
management:
  endpoints:
    enabled-by-default: false

# Logging
logging:
  level:
    root: WARN
    ai.aipr: DEBUG
    org.springframework.test: INFO
