server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  
spring:
  application:
    name: aipr-server
    
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
    
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/aipr}
    username: ${DATABASE_USER:aipr}
    password: ${DATABASE_PASSWORD:aipr_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: aipr-pool
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      
  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 5000ms
      
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
        order_updates: true
          
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s
      
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
        
# Application configuration
aipr:
  # gRPC Engine Configuration
  engine:
    # Primary engine instance
    host: ${ENGINE_HOST:localhost}
    port: ${ENGINE_PORT:50051}
    timeout-ms: 30000
    
    # Multiple engine instances for load balancing (production)
    instances:
      - host: ${ENGINE_HOST_1:localhost}
        port: ${ENGINE_PORT_1:50051}
        weight: 1
      - host: ${ENGINE_HOST_2:}
        port: ${ENGINE_PORT_2:50052}
        weight: 1
    
    # Connection settings
    negotiation-type: ${ENGINE_NEGOTIATION:PLAINTEXT}  # PLAINTEXT or TLS
    retry:
      max-attempts: 3
      initial-backoff-ms: 100
      max-backoff-ms: 5000
    pool:
      max-channels: 10
      idle-timeout-seconds: 300
    
  llm:
    provider: ${LLM_PROVIDER:openai-compatible}
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:gpt-4-turbo-preview}
    max-tokens: ${LLM_MAX_TOKENS:4096}
    temperature: ${LLM_TEMPERATURE:0.1}
    timeout-ms: ${LLM_TIMEOUT_MS:120000}
    
  review:
    max-diff-size: ${MAX_DIFF_SIZE:500000}
    max-files-per-pr: ${MAX_FILES_PER_PR:100}
    max-comments-per-review: ${MAX_COMMENTS:50}
    enable-heuristics: true
    enable-context-retrieval: true
    
  security:
    webhook-secret: ${WEBHOOK_SECRET:}
    jwt-secret: ${JWT_SECRET:}
    jwt-expiration-ms: 3600000
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  
  # ==========================================================================
  # Platform Authentication Configuration
  # ==========================================================================
  # Each platform can be enabled/disabled independently.
  # For self-hosted instances, configure the base-url accordingly.
  
  auth:
    # Session settings
    session-timeout: ${SESSION_TIMEOUT:24h}
    encryption-key: ${AIPR_ENCRYPTION_KEY:}
    
    github:
      enabled: ${GITHUB_AUTH_ENABLED:true}
      # For GitHub.com (default)
      base-url: ${GITHUB_BASE_URL:https://github.com}
      api-url: ${GITHUB_API_URL:https://api.github.com}
      # For GitHub Enterprise, set:
      #   GITHUB_BASE_URL=https://github.yourcompany.com
      #   GITHUB_API_URL=https://github.yourcompany.com/api/v3
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
      # Optional: GitHub App (for org-level access)
      app-id: ${GITHUB_APP_ID:}
      private-key-path: ${GITHUB_PRIVATE_KEY_PATH:}
      webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
      
    gitlab:
      enabled: ${GITLAB_AUTH_ENABLED:false}
      # For GitLab.com (default)
      base-url: ${GITLAB_BASE_URL:https://gitlab.com}
      # For self-hosted GitLab, set:
      #   GITLAB_BASE_URL=https://gitlab.yourcompany.com
      application-id: ${GITLAB_APPLICATION_ID:}
      application-secret: ${GITLAB_APPLICATION_SECRET:}
      webhook-secret: ${GITLAB_WEBHOOK_SECRET:}
      
    bitbucket:
      enabled: ${BITBUCKET_AUTH_ENABLED:false}
      # For Bitbucket Cloud (default)
      base-url: ${BITBUCKET_BASE_URL:https://bitbucket.org}
      api-url: ${BITBUCKET_API_URL:https://api.bitbucket.org/2.0}
      # For Bitbucket Server/Data Center, set:
      #   BITBUCKET_BASE_URL=https://bitbucket.yourcompany.com
      #   BITBUCKET_API_URL=https://bitbucket.yourcompany.com/rest/api/1.0
      client-id: ${BITBUCKET_CLIENT_ID:}
      client-secret: ${BITBUCKET_CLIENT_SECRET:}
      webhook-secret: ${BITBUCKET_WEBHOOK_SECRET:}
    
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      base-path: ${STORAGE_PATH:./data}
    s3:
      bucket: ${S3_BUCKET:}
      region: ${S3_REGION:us-east-1}
      
logging:
  level:
    root: INFO
    ai.aipr: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
