# =============================================================================
# Production Configuration Profile
# =============================================================================

spring:
  profiles: production
  
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    hikari:
      pool-name: aipr-pool
      maximum-pool-size: ${DB_POOL_SIZE:50}
      minimum-idle: 10
      
  jpa:
    show-sql: false
    properties:
      hibernate:
        generate_statistics: false
        
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      cluster:
        nodes: ${REDIS_CLUSTER_NODES:}

# =============================================================================
# gRPC Configuration (Server & Client)
# =============================================================================
grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}
    security:
      enabled: ${GRPC_TLS_ENABLED:true}
      cert-chain: ${GRPC_TLS_CERT:/etc/aipr/certs/server.crt}
      private-key: ${GRPC_TLS_KEY:/etc/aipr/certs/server.key}
      # Optional: mTLS (mutual TLS) - require client certificates
      client-auth: ${GRPC_CLIENT_AUTH:OPTIONAL}  # NONE, OPTIONAL, REQUIRE
      trust-cert-collection: ${GRPC_CA_CERT:/etc/aipr/certs/ca.crt}

# =============================================================================
# Application Configuration
# =============================================================================
aipr:
  # C++ Engine gRPC Client
  engine:
    host: ${ENGINE_HOST:localhost}
    port: ${ENGINE_PORT:50051}
    negotiation-type: ${ENGINE_NEGOTIATION:TLS}
    tls:
      enabled: true
      cert-path: ${ENGINE_TLS_CERT:/etc/aipr/certs/client.crt}
      key-path: ${ENGINE_TLS_KEY:/etc/aipr/certs/client.key}
      ca-path: ${ENGINE_TLS_CA:/etc/aipr/certs/ca.crt}
    pool:
      max-channels: 50
  
  # OAuth Authentication
  auth:
    session-timeout: 24h
    encryption-key: ${AIPR_ENCRYPTION_KEY}
    
    github:
      enabled: ${GITHUB_AUTH_ENABLED:true}
      client-id: ${GITHUB_CLIENT_ID}
      client-secret: ${GITHUB_CLIENT_SECRET}
      # Optional: GitHub App for organization-level access
      app-id: ${GITHUB_APP_ID:}
      private-key-path: ${GITHUB_PRIVATE_KEY_PATH:}
      
    gitlab:
      enabled: ${GITLAB_AUTH_ENABLED:true}
      application-id: ${GITLAB_APPLICATION_ID}
      application-secret: ${GITLAB_APPLICATION_SECRET}
      # For self-hosted GitLab
      base-url: ${GITLAB_BASE_URL:https://gitlab.com}
      
    bitbucket:
      enabled: ${BITBUCKET_AUTH_ENABLED:true}
      client-id: ${BITBUCKET_CLIENT_ID}
      client-secret: ${BITBUCKET_CLIENT_SECRET}

  # Webhooks
  webhooks:
    github-secret: ${GITHUB_WEBHOOK_SECRET}
    gitlab-secret: ${GITLAB_WEBHOOK_SECRET}
    bitbucket-secret: ${BITBUCKET_WEBHOOK_SECRET:}
      
  review:
    max-comments-per-review: 100
    
  rate-limit:
    enabled: true
    reviews-per-hour: ${RATE_LIMIT_REVIEWS:2000}
    index-requests-per-hour: ${RATE_LIMIT_INDEX:200}

# =============================================================================
# Management & Monitoring
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    health:
      show-details: never

# =============================================================================
# Logging
# =============================================================================
logging:
  level:
    root: WARN
    ai.aipr: INFO
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%level","logger":"%logger","message":"%msg"}%n'
