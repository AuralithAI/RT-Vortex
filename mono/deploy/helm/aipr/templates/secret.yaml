{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aipr.secretsName" . }}
  labels:
    {{- include "aipr.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.llmApiKey }}
  AIPR_LLM_API_KEY: {{ .Values.secrets.llmApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.githubPrivateKey }}
  AIPR_GITHUB_PRIVATE_KEY: {{ .Values.secrets.githubPrivateKey | quote }}
  {{- end }}
  {{- if .Values.config.github.webhookSecret }}
  AIPR_GITHUB_WEBHOOK_SECRET: {{ .Values.config.github.webhookSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.gitlab.webhookSecret }}
  AIPR_GITLAB_WEBHOOK_SECRET: {{ .Values.config.gitlab.webhookSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.databasePassword }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.secrets.databasePassword | b64enc | quote }}
  {{- else if .Values.postgresql.enabled }}
  {{- /* Use PostgreSQL subchart secret */ -}}
  {{- end }}
{{- end }}
