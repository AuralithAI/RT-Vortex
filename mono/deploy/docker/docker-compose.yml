version: '3.8'

# =============================================================================
# RTVortex — Docker Compose
# =============================================================================
#
# Architecture:
#   - server:    Go REST API (port 8080)
#   - engine:    C++ gRPC server (port 50051, internal)
#   - postgres:  Database
#   - redis:     Cache
#
# Quick Start:
#   export LLM_API_KEY=your_api_key
#   docker compose up -d
#
# =============================================================================

services:
  # ===========================================================================
  # C++ Engine — gRPC Server
  # ===========================================================================
  engine:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.engine
    image: rtvortex-engine:latest
    container_name: rtvortex-engine
    environment:
      - ENGINE_HOST=0.0.0.0
      - ENGINE_PORT=50051
      - ENGINE_TLS_ENABLED=false
    volumes:
      - rtvortex-data:/app/data
      - rtvortex-temp:/app/temp
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # ===========================================================================
  # Go Server — REST API
  # ===========================================================================
  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: rtvortex-server:latest
    container_name: rtvortex-server
    ports:
      - "8080:8080"   # REST API
    environment:
      - RTVORTEX_HOME=/app
      # Database
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=rtvortex
      - DATABASE_USER=rtvortex
      - DATABASE_PASSWORD=${DB_PASSWORD:-rtvortex}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Engine (connects to engine container via gRPC)
      - ENGINE_HOST=engine
      - ENGINE_PORT=50051
      - ENGINE_NEGOTIATION=PLAINTEXT
      # LLM
      - LLM_PROVIDER=${LLM_PROVIDER:-openai-compatible}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4-turbo-preview}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      # Server
      - SERVER_PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - rtvortex-data:/app/data
      - rtvortex-temp:/app/temp
    depends_on:
      engine:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: rtvortex-postgres
    environment:
      - POSTGRES_USER=rtvortex
      - POSTGRES_PASSWORD=${DB_PASSWORD:-rtvortex}
      - POSTGRES_DB=rtvortex
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtvortex"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: unless-stopped

  # ===========================================================================
  # Redis Cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: rtvortex-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # ===========================================================================
  # Prometheus (Metrics)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: rtvortex-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      - server
    restart: unless-stopped

  # ===========================================================================
  # Grafana (Dashboards)
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: rtvortex-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  rtvortex-data:
  rtvortex-temp:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: rtvortex-network
