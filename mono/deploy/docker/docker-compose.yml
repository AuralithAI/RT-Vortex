version: '3.8'

# =============================================================================
# AI PR Reviewer - Docker Compose
# =============================================================================
#
# Architecture:
#   - engine:  C++ gRPC server (port 50051, internal)
#   - server:  Java REST/gRPC API (ports 8080, 9090)
#   - postgres: Database
#   - redis:    Cache (optional)
#
# Quick Start:
#   export LLM_API_KEY=your_api_key
#   docker compose up -d
#
# =============================================================================

services:
  # ===========================================================================
  # C++ Engine - gRPC Server
  # ===========================================================================
  engine:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: engine-runtime  # If using multi-target, or just use Dockerfile.engine
    image: aipr-engine:latest
    container_name: aipr-engine
    # Engine only listens internally, not exposed to host by default
    # Uncomment to expose for debugging:
    # ports:
    #   - "50051:50051"
    environment:
      - ENGINE_HOST=0.0.0.0
      - ENGINE_PORT=50051
      - ENGINE_TLS_ENABLED=false
    volumes:
      - aipr-data:/app/data
      - aipr-logs:/app/logs
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # ===========================================================================
  # Java Server - REST & gRPC API
  # ===========================================================================
  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: aipr-server
    ports:
      - "8080:8080"   # REST API
      - "9090:9090"   # gRPC API (for SDK clients)
    environment:
      - SPRING_PROFILES_ACTIVE=production
      # Database
      - DATABASE_URL=jdbc:postgresql://postgres:5432/aipr
      - DATABASE_USER=aipr
      - DATABASE_PASSWORD=${DB_PASSWORD:-aipr}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Engine (connects to engine container via gRPC)
      - ENGINE_HOST=engine
      - ENGINE_PORT=50051
      - ENGINE_NEGOTIATION=PLAINTEXT
      # LLM
      - LLM_PROVIDER=${LLM_PROVIDER:-openai-compatible}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4-turbo-preview}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      # Storage
      - STORAGE_TYPE=local
      - STORAGE_PATH=/app/data
    volumes:
      - aipr-data:/app/data
      - aipr-logs:/app/logs
    depends_on:
      engine:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped

  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: aipr-postgres
    environment:
      - POSTGRES_USER=aipr
      - POSTGRES_PASSWORD=${DB_PASSWORD:-aipr}
      - POSTGRES_DB=aipr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipr"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: unless-stopped

  # ===========================================================================
  # Redis Cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: aipr-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # ===========================================================================
  # Prometheus (Metrics)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: aipr-prometheus
    ports:
      - "9091:9090"  # Changed to avoid conflict with server gRPC port
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      - server
    restart: unless-stopped

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:10.2.0
    container_name: aipr-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  aipr-data:
  aipr-logs:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: aipr-network
