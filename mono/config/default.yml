# =============================================================================
# AI PR Reviewer — C++ Engine Configuration
# =============================================================================
#
# This file is read ONLY by the C++ engine (aipr-engine).
# The Go server reads rtserverprops.xml instead.
#
# Usage:
#   ./bin/aipr-engine --config config/default.yml
#
# Format: flat key:value pairs. The C++ config loader does NOT parse nested
# YAML — it reads each "key: value" line independently. Do not nest keys.
#
# All settings below have sensible defaults in engine_api.h. You only need
# to override values that differ from the defaults.
# =============================================================================

# --- Storage -----------------------------------------------------------------
# Where the engine stores FAISS indexes, code chunks, and manifests.
# This is the LOCAL path used when running standalone or as a fallback.
# In production, the Java server pushes cloud storage config (S3/GCS/etc.)
# via the ConfigureStorage gRPC call — overriding this path.
storage_path: .aipr/index

# --- Indexing ----------------------------------------------------------------
# Maximum file size to index (larger files are skipped)
max_file_size_kb: 1024

# Code chunk size in tokens (for FAISS vector entries)
chunk_size: 512

# Overlap between adjacent chunks (for context continuity)
chunk_overlap: 64

# Use tree-sitter AST parsing for intelligent chunking.
# When false, falls back to regex-based line splitting.
enable_ast_chunking: true

# --- Retrieval ---------------------------------------------------------------
# Number of top results returned from hybrid search
top_k: 20

# Weight for BM25 lexical search (text matching)
lexical_weight: 0.3

# Weight for FAISS vector search (semantic similarity)
# lexical_weight + vector_weight should equal 1.0
vector_weight: 0.7

# How many hops to traverse in the symbol graph
graph_expand_depth: 2

# --- Embedding Provider ------------------------------------------------------
# "HTTP"        — Call an OpenAI-compatible embedding API (default)
# "LOCAL_ONNX"  — Run all-MiniLM-L6-v2 locally via ONNX Runtime (no API cost)
# "CUSTOM"      — Custom provider
embed_provider: LOCAL_ONNX

# --- HTTP Embedding (when embed_provider = HTTP) -----------------------------
# API endpoint for embeddings (any OpenAI-compatible API)
embed_endpoint: https://api.openai.com/v1/embeddings

# Name of the environment variable that holds the API key
# (the engine reads the key from this env var — not stored in config)
embed_api_key_env: OPENAI_API_KEY

# Model name sent in the API request
embed_model: text-embedding-3-small

# Vector dimensions (must match the model's output)
# For LOCAL_ONNX with all-MiniLM-L6-v2: 384
# For HTTP with text-embedding-3-small: 1536
embed_dimensions: 384

# Number of texts to embed in a single API call
embed_batch_size: 100

# HTTP timeout for embedding API calls (seconds)
embed_timeout_seconds: 60

# --- Local ONNX Embedding (when embed_provider = LOCAL_ONNX) -----------------
# Path to the ONNX model file (relative to engine binary or absolute)
onnx_model_path: models/all-MiniLM-L6-v2.onnx

# Path to the ONNX tokenizer file
onnx_tokenizer_path: models/tokenizer.json

# Number of parallel ONNX sessions for embedding.
# 0 = auto (cores / 4, max 8). Each session gets its own thread pool.
# Increase for throughput on high-core-count machines; decrease to limit RAM.
onnx_parallel_workers: 0

# Intra-op thread count per ONNX session.
# 0 = auto (cores / workers). Controls SIMD parallelism within each session.
onnx_intra_op_threads: 0

# --- Ingestion ---------------------------------------------------------------
# Number of files processed per batch during repository ingestion.
# Lower values reduce peak RAM; higher values reduce overhead.
# Default: 5000. For machines with <16 GB RAM, try 2000.
ingest_batch_size: 5000
