// User Session gRPC Service Definition
// Defines the remote session management protocol

syntax = "proto3";

package aipr.session.v1;

option java_package = "ai.aipr.session.grpc";
option java_outer_classname = "SessionProto";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";
import "google/protobuf/any.proto";

// =============================================================================
// Session Service - Remote session management
// =============================================================================

service SessionService {
    // Create a new session
    rpc CreateSession(CreateSessionRequest) returns (SessionInfo);
    
    // Validate and get session info
    rpc GetSession(GetSessionRequest) returns (SessionInfo);
    
    // Refresh session token
    rpc RefreshSession(RefreshSessionRequest) returns (SessionInfo);
    
    // Revoke/logout session
    rpc RevokeSession(RevokeSessionRequest) returns (RevokeSessionResponse);
    
    // Heartbeat for connection keep-alive
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
    
    // Stream session events (for real-time updates)
    rpc StreamSessionEvents(StreamSessionRequest) returns (stream SessionEvent);
}

// =============================================================================
// Data Service - Delegated data operations through session
// =============================================================================

service DataService {
    // Generic data operations - delegated through session context
    rpc Execute(DataRequest) returns (DataResponse);
    
    // Stream data operations
    rpc ExecuteStream(DataRequest) returns (stream DataResponse);
    
    // Batch operations
    rpc ExecuteBatch(BatchDataRequest) returns (BatchDataResponse);
}

// =============================================================================
// User Session Remote Interface
// This maps to IUserSessionRemote in Java
// =============================================================================

service UserSessionRemote {
    // Review operations within session context
    rpc SubmitReview(SessionReviewRequest) returns (SessionReviewResponse);
    rpc GetReviewStatus(SessionGetReviewRequest) returns (SessionReviewResponse);
    rpc ListReviews(SessionListReviewsRequest) returns (SessionListReviewsResponse);
    rpc CancelReview(SessionCancelReviewRequest) returns (SessionCancelReviewResponse);
    
    // Index operations within session context
    rpc TriggerIndex(SessionIndexRequest) returns (SessionIndexResponse);
    rpc GetIndexStatus(SessionGetIndexStatusRequest) returns (SessionIndexStatusResponse);
    
    // Repository operations within session context
    rpc ListRepositories(SessionListReposRequest) returns (SessionListReposResponse);
    rpc GetRepository(SessionGetRepoRequest) returns (SessionRepoResponse);
    
    // LLM provider operations
    rpc ListLLMProviders(SessionListLLMRequest) returns (SessionListLLMResponse);
    rpc TestLLMConnection(SessionTestLLMRequest) returns (SessionTestLLMResponse);
    rpc ConfigureLLMProvider(SessionConfigureLLMRequest) returns (SessionConfigureLLMResponse);
}

// =============================================================================
// Session Messages
// =============================================================================

message CreateSessionRequest {
    string platform = 1;              // github, gitlab, bitbucket
    string access_token = 2;          // Platform OAuth token
    string device_id = 3;             // Optional device identifier
    string client_type = 4;           // sdk_java, sdk_python, cli, web
    string client_version = 5;
    map<string, string> metadata = 6;
}

message GetSessionRequest {
    string session_token = 1;
}

message RefreshSessionRequest {
    string session_token = 1;
    string refresh_token = 2;
}

message RevokeSessionRequest {
    string session_token = 1;
    bool revoke_all = 2;              // Revoke all sessions for this user
}

message RevokeSessionResponse {
    bool success = 1;
    int32 sessions_revoked = 2;
}

message HeartbeatRequest {
    string session_token = 1;
    string channel_id = 2;
}

message HeartbeatResponse {
    bool valid = 1;
    int64 ttl_seconds = 2;            // Time to live
    bool requires_refresh = 3;
}

message StreamSessionRequest {
    string session_token = 1;
    repeated string event_types = 2;  // Filter by event types
}

message SessionInfo {
    string session_id = 1;
    string session_token = 2;
    string refresh_token = 3;
    string user_id = 4;
    string username = 5;
    string email = 6;
    string grpc_channel_id = 7;
    google.protobuf.Timestamp created_at = 8;
    google.protobuf.Timestamp expires_at = 9;
    map<string, string> metadata = 10;
}

message SessionEvent {
    string event_id = 1;
    string event_type = 2;            // session_expired, review_completed, etc.
    string session_id = 3;
    google.protobuf.Timestamp timestamp = 4;
    google.protobuf.Any payload = 5;
}

// =============================================================================
// Data Service Messages
// =============================================================================

message DataRequest {
    string session_token = 1;
    string operation = 2;             // Operation name
    string resource_type = 3;         // Resource type
    string resource_id = 4;           // Optional resource ID
    bytes payload = 5;                // Serialized request payload
    map<string, string> headers = 6;
}

message DataResponse {
    bool success = 1;
    string message = 2;
    bytes payload = 3;                // Serialized response payload
    map<string, string> headers = 4;
}

message BatchDataRequest {
    string session_token = 1;
    repeated DataRequest requests = 2;
    bool stop_on_error = 3;
}

message BatchDataResponse {
    bool success = 1;
    repeated DataResponse responses = 2;
    int32 succeeded = 3;
    int32 failed = 4;
}

// =============================================================================
// Session-Scoped Review Messages
// =============================================================================

message SessionReviewRequest {
    string session_token = 1;
    string repository_id = 2;
    int32 pr_number = 3;
    string head_commit = 4;
    string base_commit = 5;
    ReviewOptions options = 6;
}

message ReviewOptions {
    repeated string categories = 1;
    string min_severity = 2;
    int32 max_comments = 3;
    bool include_suggestions = 4;
    bool post_to_platform = 5;
    string llm_provider = 6;          // Override default LLM
    string llm_model = 7;
    map<string, string> extra = 8;
}

message SessionReviewResponse {
    string review_id = 1;
    string status = 2;
    string summary = 3;
    repeated ReviewComment comments = 4;
    ReviewMetrics metrics = 5;
    google.protobuf.Timestamp created_at = 6;
    google.protobuf.Timestamp completed_at = 7;
}

message ReviewComment {
    string id = 1;
    string file_path = 2;
    int32 line = 3;
    int32 end_line = 4;
    string severity = 5;
    string category = 6;
    string message = 7;
    string suggestion = 8;
    float confidence = 9;
}

message ReviewMetrics {
    int32 files_analyzed = 1;
    int32 lines_added = 2;
    int32 lines_removed = 3;
    int32 total_findings = 4;
    int32 tokens_used = 5;
    int32 latency_ms = 6;
}

message SessionGetReviewRequest {
    string session_token = 1;
    string review_id = 2;
}

message SessionListReviewsRequest {
    string session_token = 1;
    string repository_id = 2;
    string status = 3;
    int32 page_size = 4;
    string page_token = 5;
}

message SessionListReviewsResponse {
    repeated SessionReviewResponse reviews = 1;
    string next_page_token = 2;
    int32 total_count = 3;
}

message SessionCancelReviewRequest {
    string session_token = 1;
    string review_id = 2;
}

message SessionCancelReviewResponse {
    bool success = 1;
    string message = 2;
}

// =============================================================================
// Session-Scoped Index Messages
// =============================================================================

message SessionIndexRequest {
    string session_token = 1;
    string repository_id = 2;
    bool full_reindex = 3;
}

message SessionIndexResponse {
    string job_id = 1;
    string status = 2;
    string message = 3;
}

message SessionGetIndexStatusRequest {
    string session_token = 1;
    string repository_id = 2;
}

message SessionIndexStatusResponse {
    string repository_id = 1;
    bool indexed = 2;
    int32 total_files = 3;
    int32 indexed_files = 4;
    int32 total_chunks = 5;
    string last_commit = 6;
    google.protobuf.Timestamp last_indexed_at = 7;
    string job_status = 8;
    float job_progress = 9;
}

// =============================================================================
// Session-Scoped Repository Messages
// =============================================================================

message SessionListReposRequest {
    string session_token = 1;
    int32 page_size = 2;
    string page_token = 3;
}

message SessionListReposResponse {
    repeated RepositoryInfo repositories = 1;
    string next_page_token = 2;
    int32 total_count = 3;
}

message SessionGetRepoRequest {
    string session_token = 1;
    string repository_id = 2;
}

message SessionRepoResponse {
    RepositoryInfo repository = 1;
}

message RepositoryInfo {
    string id = 1;
    string platform = 2;
    string owner = 3;
    string name = 4;
    string default_branch = 5;
    string role = 6;                  // User's role in this repo
    bool indexed = 7;
    google.protobuf.Timestamp last_indexed_at = 8;
}

// =============================================================================
// Session-Scoped LLM Configuration Messages
// =============================================================================

message SessionListLLMRequest {
    string session_token = 1;
}

message SessionListLLMResponse {
    repeated LLMProviderConfig providers = 1;
    string default_provider = 2;
}

message LLMProviderConfig {
    string id = 1;
    string name = 2;
    string provider_type = 3;         // openai, anthropic, azure, ollama
    bool is_default = 4;
    bool is_connected = 5;
    repeated string available_models = 6;
}

message SessionTestLLMRequest {
    string session_token = 1;
    string provider_id = 2;
}

message SessionTestLLMResponse {
    bool success = 1;
    string message = 2;
    int32 latency_ms = 3;
    repeated string available_models = 4;
}

message SessionConfigureLLMRequest {
    string session_token = 1;
    string config_name = 2;
    string provider_type = 3;
    string base_url = 4;
    string api_key = 5;               // Will be encrypted server-side
    string default_model = 6;
    bool set_as_default = 7;
    map<string, string> extra_config = 8;
}

message SessionConfigureLLMResponse {
    bool success = 1;
    string provider_id = 2;
    string message = 3;
}
