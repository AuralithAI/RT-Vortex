// RTVortex Engine gRPC Service Definition
// This defines the communication protocol between the API Server and C++ Engine

syntax = "proto3";

package aipr.engine.v1;

option java_package = "ai.aipr.engine.grpc";
option java_outer_classname = "EngineProto";
option java_multiple_files = true;
option go_package = "github.com/AuralithAI/rtvortex-server/internal/engine/pb";

// Main Engine Service
service EngineService {
    // Indexing Operations
    rpc IndexRepository(IndexRequest) returns (IndexResponse);
    rpc IndexRepositoryStream(IndexRequest) returns (stream IndexProgressUpdate);
    rpc IncrementalIndex(IncrementalIndexRequest) returns (IndexResponse);
    rpc GetIndexStats(IndexStatsRequest) returns (IndexStatsResponse);
    rpc DeleteIndex(DeleteIndexRequest) returns (DeleteIndexResponse);

    // Retrieval Operations
    rpc Search(SearchRequest) returns (SearchResponse);
    rpc SearchStream(SearchRequest) returns (stream ContextChunk);

    // Review Operations
    rpc BuildReviewContext(ReviewContextRequest) returns (ReviewContextResponse);
    rpc BuildReviewContextStream(ReviewContextRequest) returns (stream PREmbedProgressUpdate);
    rpc RunHeuristics(HeuristicsRequest) returns (HeuristicsResponse);

    // Configuration — API server pushes config to engine at startup
    rpc ConfigureStorage(StorageConfigRequest) returns (StorageConfigResponse);

    // Health & Diagnostics
    rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
    rpc GetDiagnostics(DiagnosticsRequest) returns (DiagnosticsResponse);

    // Embedding Statistics — per-repo embedding health and performance data
    rpc GetEmbedStats(EmbedStatsRequest) returns (EmbedStatsResponse);

    // File Content — read a file from the engine's local clone for the swarm
    rpc GetFileContent(FileContentRequest) returns (FileContentResponse);

    // Asset Ingestion — embed documents, PDFs, images, audio, and URL content into a repo index
    rpc IngestAsset(IngestAssetRequest) returns (IngestAssetResponse);

    // Multimodal Embedding Configuration
    rpc GetMultimodalConfig(GetMultimodalConfigRequest) returns (GetMultimodalConfigResponse);
    rpc ConfigureMultimodal(ConfigureMultimodalRequest) returns (ConfigureMultimodalResponse);
    rpc DownloadModel(ConfigureMultimodalRequest) returns (stream ModelDownloadProgress);

    // Metrics — server-streaming so the Go API server can relay to the dashboard.
    // The engine pushes a snapshot every interval_ms (default 1000).
    rpc StreamEngineMetrics(EngineMetricsRequest) returns (stream EngineMetricsSnapshot);
}

// ============================================================================
// Common Types
// ============================================================================

enum Severity {
    SEVERITY_UNSPECIFIED = 0;
    SEVERITY_INFO = 1;
    SEVERITY_WARNING = 2;
    SEVERITY_ERROR = 3;
    SEVERITY_CRITICAL = 4;
}

enum CheckCategory {
    CATEGORY_UNSPECIFIED = 0;
    CATEGORY_SECURITY = 1;
    CATEGORY_PERFORMANCE = 2;
    CATEGORY_RELIABILITY = 3;
    CATEGORY_STYLE = 4;
    CATEGORY_ARCHITECTURE = 5;
    CATEGORY_TESTING = 6;
    CATEGORY_DOCUMENTATION = 7;
}

// ============================================================================
// Indexing Messages
// ============================================================================

message IndexRequest {
    string repo_id = 1;
    string repo_path = 2;
    IndexConfig config = 3;
}

message IndexConfig {
    uint32 max_file_size_kb = 1;
    uint32 chunk_size = 2;
    uint32 chunk_overlap = 3;
    bool enable_ast_chunking = 4;
    repeated string exclude_patterns = 5;
    repeated string include_languages = 6;
    string embedding_endpoint = 7;
    uint32 embedding_dimensions = 8;
    // Embedding provider type: "LOCAL_ONNX", "HTTP", "CUSTOM".
    // When empty the engine uses its default (LOCAL_ONNX).
    string embedding_provider = 9;
    // Embedding model name (e.g. "text-embedding-3-small").
    string embedding_model = 10;
    // API key for the external embedding provider (passed at runtime, never stored in config files).
    string embedding_api_key = 11;
    // VCS clone token — used for authenticated git clone of private repositories.
    // Resolved server-side from the user's vault; never stored in the engine.
    string clone_token = 12;

    // Per-repo model config ──────────────────────────────────────
    // Default LLM model to use for this repo (e.g. "gpt-4o-mini").
    string default_model = 13;
    // Override memory account routing (force all chunks to this account).
    string memory_account_override = 14;
    // Max hierarchy depth for submodule scanning (0 = unlimited).
    uint32 hierarchy_levels = 15;
    // Auto-detect repo type (web_app, microservice, etc.) from manifest.
    bool auto_detect_repo_type = 16;
    // Explicit repo type override (takes precedence over auto-detection).
    RepoType repo_type = 17;

    // Index action: controls clone/index behaviour.
    //   "index"   — (default) clone if needed, pull updates, then index.
    //   "reindex" — skip git operations, re-parse existing local files.
    //   "reclone" — delete local clone, re-clone from remote, then index.
    string index_action = 18;

    // Target branch to checkout before indexing (empty = use default).
    string target_branch = 19;
}

// Repository type classification — used for tuning chunking/retrieval heuristics.
enum RepoType {
    REPO_TYPE_UNKNOWN      = 0;
    REPO_TYPE_GENERIC      = 1;
    REPO_TYPE_WEB_APP      = 2;
    REPO_TYPE_MICROSERVICE = 3;
    REPO_TYPE_ML_PIPELINE  = 4;
    REPO_TYPE_MOBILE_APP   = 5;
    REPO_TYPE_DATA_PIPELINE= 6;
    REPO_TYPE_CLI_TOOL     = 7;
    REPO_TYPE_LIBRARY      = 8;
    REPO_TYPE_MONOLITH     = 9;
}

message IncrementalIndexRequest {
    string repo_id = 1;
    repeated string changed_files = 2;
    string base_commit = 3;
    string head_commit = 4;
}

message IndexResponse {
    bool success = 1;
    string message = 2;
    IndexStats stats = 3;
}

// Progress update streamed during IndexRepositoryStream.
message IndexProgressUpdate {
    string repo_id = 1;
    int32 progress = 2;              // 0-100
    string phase = 3;                // "cloning", "scanning", "chunking", "embedding", "finalizing"
    uint64 files_processed = 4;
    uint64 files_total = 5;
    string current_file = 6;
    int64 eta_seconds = 7;           // estimated time remaining (-1 = unknown)
    bool done = 8;                   // true on final message
    bool success = 9;                // only meaningful when done=true
    string error = 10;               // populated on failure
    IndexStats final_stats = 11;     // populated only when done=true && success=true
}

message IndexStatsRequest {
    string repo_id = 1;
}

message IndexStatsResponse {
    bool found = 1;
    IndexStats stats = 2;
}

message IndexStats {
    string repo_id = 1;
    string index_version = 2;
    uint64 total_files = 3;
    uint64 indexed_files = 4;
    uint64 total_chunks = 5;
    uint64 total_symbols = 6;
    uint64 index_size_bytes = 7;
    string last_updated = 8;
    bool is_complete = 9;
    map<string, uint64> files_by_language = 10;
}

message DeleteIndexRequest {
    string repo_id = 1;
}

message DeleteIndexResponse {
    bool success = 1;
    string message = 2;
}

// ============================================================================
// Search Messages
// ============================================================================

message SearchRequest {
    string repo_id = 1;
    string query = 2;
    repeated string touched_symbols = 3;
    SearchConfig config = 4;
}

message SearchConfig {
    uint32 top_k = 1;
    float lexical_weight = 2;
    float vector_weight = 3;
    uint32 graph_expand_depth = 4;
    repeated string file_filters = 5;
    repeated string language_filters = 6;
}

message SearchResponse {
    repeated ContextChunk chunks = 1;
    SearchMetrics metrics = 2;
    bool requires_llm = 3;             // False when confidence gate fires
    float max_retrieval_score = 4;      // Highest similarity score in results
    string llm_skip_reason = 5;         // Human-readable gate reason (empty when requires_llm=true)
    float graph_confidence_score = 6;   // KG path-length confidence (0-1), used by gate v2
    uint32 graph_expanded_count = 7;    // Number of chunks added by GraphRAG expansion
}

message ContextChunk {
    string id = 1;
    string file_path = 2;
    uint32 start_line = 3;
    uint32 end_line = 4;
    string content = 5;
    string language = 6;
    repeated string symbols = 7;
    float relevance_score = 8;
    string chunk_type = 9;  // "function", "class", "block", etc.
}

message SearchMetrics {
    uint32 total_candidates = 1;
    uint32 lexical_hits = 2;
    uint32 vector_hits = 3;
    uint32 graph_hits = 4;
    uint64 search_time_ms = 5;
}

// ============================================================================
// Review Messages
// ============================================================================

message ReviewContextRequest {
    string repo_id = 1;
    string diff = 2;
    string pr_title = 3;
    string pr_description = 4;
    uint32 max_context_chunks = 5;
}

message ReviewContextResponse {
    ContextPack context_pack = 1;
}

// Progress update streamed during BuildReviewContextStream.
message PREmbedProgressUpdate {
    string repo_id = 1;
    int32 pr_number = 2;
    int32 progress = 3;              // 0-100
    string phase = 4;                // "parsing_diff", "resolving_symbols", "building_graph", "embedding_chunks", "finalizing"
    uint32 files_processed = 5;
    uint32 files_total = 6;
    string current_file = 7;
    int64 eta_seconds = 8;           // estimated time remaining (-1 = unknown)
    bool done = 9;                   // true on final message
    bool success = 10;               // only meaningful when done=true
    string error = 11;               // populated on failure
    ContextPack context_pack = 12;   // populated only when done=true && success=true
}

message ContextPack {
    string repo_id = 1;
    string pr_title = 2;
    string pr_description = 3;
    string diff = 4;
    repeated ContextChunk context_chunks = 5;
    repeated TouchedSymbol touched_symbols = 6;
    repeated string heuristic_warnings = 7;
    uint64 total_tokens_estimate = 8;
}

message TouchedSymbol {
    string name = 1;
    string qualified_name = 2;
    string kind = 3;  // "function", "class", "variable", etc.
    string file_path = 4;
    uint32 line = 5;
    string change_type = 6;  // "added", "modified", "deleted"
    uint32 end_line = 7;     // End line of the symbol (0 = same as line)
    repeated string callers = 8;   // Qualified names of symbols that call this one
    repeated string callees = 9;   // Qualified names of symbols called by this one
}

message HeuristicsRequest {
    string diff = 1;
    repeated string enabled_checks = 2;
}

message HeuristicsResponse {
    repeated HeuristicFinding findings = 1;
}

message HeuristicFinding {
    string id = 1;
    CheckCategory category = 2;
    Severity severity = 3;
    float confidence = 4;
    string file_path = 5;
    uint32 line = 6;
    string message = 7;
    string suggestion = 8;
    string evidence = 9;
    string rule_id = 10;
    uint32 end_line = 11;  // End line of the finding (0 = same as line)
    string rule_name = 12; // Human-readable name of the rule
}

// ============================================================================
// Health & Diagnostics
// ============================================================================

message HealthCheckRequest {}

message HealthCheckResponse {
    bool healthy = 1;
    string version = 2;
    uint64 uptime_seconds = 3;
    map<string, string> components = 4;
    bool metrics_enabled = 5;           // true if StreamEngineMetrics is available
    uint32 active_metric_streams = 6;   // number of connected metric subscribers
}

message DiagnosticsRequest {
    bool include_memory = 1;
    bool include_indices = 2;
}

message DiagnosticsResponse {
    MemoryStats memory = 1;
    repeated IndexInfo indices = 2;
    map<string, string> config = 3;
}

message MemoryStats {
    uint64 heap_used_bytes = 1;
    uint64 heap_total_bytes = 2;
    uint64 rss_bytes = 3;
}

message IndexInfo {
    string repo_id = 1;
    uint64 size_bytes = 2;
    string last_updated = 3;
    bool is_loaded = 4;
}

// ============================================================================
// Storage Configuration — pushed from API server to C++ engine at startup
// ============================================================================

// Cloud provider type
enum StorageProvider {
    STORAGE_PROVIDER_LOCAL = 0;
    STORAGE_PROVIDER_AWS = 1;
    STORAGE_PROVIDER_GCP = 2;
    STORAGE_PROVIDER_AZURE = 3;
    STORAGE_PROVIDER_OCI = 4;
    STORAGE_PROVIDER_MINIO = 5;
    STORAGE_PROVIDER_CUSTOM = 6;
}

// Request to configure storage backend on the C++ engine.
// The API server reads rtserverprops.xml and pushes this to the engine once at startup.
message StorageConfigRequest {
    StorageProvider provider = 1;

    // Common fields
    string base_path = 2;              // For local storage
    string bucket = 3;
    string region = 4;
    string endpoint_url = 5;           // Custom S3-compatible endpoint

    // Authentication
    string access_key = 6;
    string secret_key = 7;
    string session_token = 8;

    // AWS specific
    bool use_irsa = 9;                 // AWS IAM Roles for Service Accounts
    string role_arn = 10;

    // GCP specific
    bool use_workload_identity = 11;

    // Azure specific
    string azure_account_name = 12;
    string azure_account_key = 13;
    string azure_sas_token = 14;
    bool use_azure_ad = 15;

    // OCI specific
    string oci_tenancy = 16;
    string oci_user = 17;
    string oci_fingerprint = 18;
    string oci_key_file = 19;
    string oci_namespace = 20;

    // Connection settings
    int32 timeout_ms = 21;
    int32 max_retries = 22;
    bool use_ssl = 23;
    bool verify_ssl = 24;
    string ca_bundle_path = 25;

    // API server callback URL — the Go server passes its own base URL so the
    // engine can call back (e.g. Redis embed-cache proxy, webhook delivery).
    // Example: "http://localhost:8080" or "https://api.rtvortex.example.com"
    string server_callback_url = 26;
}

message StorageConfigResponse {
    bool success = 1;
    string message = 2;
    string active_provider = 3;        // Echoes back the provider now in use
}

// ============================================================================
// Engine Metrics
// ============================================================================

// Request to start the metrics stream.
message EngineMetricsRequest {
    uint32 interval_ms = 1;
}

// A single metric value in the snapshot.
message MetricValueProto {
    enum MetricType {
        COUNTER   = 0;
        GAUGE     = 1;
        HISTOGRAM = 2;
    }
    MetricType type = 1;
    double scalar = 2;                  // For COUNTER and GAUGE
    HistogramProto histogram = 3;       // For HISTOGRAM
}

// Histogram percentile snapshot.
message HistogramProto {
    uint64 count   = 1;
    double sum     = 2;
    double min_val = 3;
    double max_val = 4;
    double avg     = 5;
    double p50     = 6;
    double p90     = 7;
    double p95     = 8;
    double p99     = 9;
}

// Full engine metrics snapshot pushed on each interval.
message EngineMetricsSnapshot {
    uint64 timestamp_ms = 1;                        // Unix epoch millis
    map<string, MetricValueProto> metrics = 2;      // All metrics by name
    uint64 uptime_s = 3;                            // Engine uptime in seconds

    // ── Structured index/KG data ───────────────────────────────────
    map<string, uint64> index_sizes_bytes = 4;      // Per-repo index file sizes
    uint64 knowledge_graph_nodes = 5;               // Total KG nodes
    uint64 knowledge_graph_edges = 6;               // Total KG edges
    string migration_status = 7;                    // "idle" | "migrating" | "done"
}

// ============================================================================
// Embedding Statistics
// ============================================================================

message EmbedStatsRequest {
    string repo_id = 1;       // Repository to get stats for (empty = global)
}

message EmbedStatsResponse {
    // Model information
    string active_model = 1;
    uint32 embedding_dimension = 2;
    string backend_type = 3;          // "onnx", "http", "mock"

    // Index statistics
    uint64 total_chunks = 4;
    uint64 total_vectors = 5;
    uint64 index_size_bytes = 6;

    // Knowledge graph statistics
    uint64 kg_nodes = 7;
    uint64 kg_edges = 8;
    bool kg_enabled = 9;

    // Merkle cache statistics
    uint64 merkle_cached_files = 10;
    double merkle_cache_hit_rate = 11;

    // Performance metrics
    double avg_embed_latency_ms = 12;
    double avg_search_latency_ms = 13;
    uint64 total_queries = 14;

    // Cache statistics
    uint64 embed_cache_size = 15;
    double embed_cache_hit_rate = 16;

    // Confidence gate statistics
    double llm_avoided_rate = 17;
    double avg_confidence_score = 18;
    uint64 llm_avoided_count = 19;
    uint64 llm_used_count = 20;

    // GraphRAG statistics
    double avg_graph_expansion_ms = 21;
    double avg_graph_expanded_chunks = 22;

    // Hot-swap model tracking
    uint64 model_swaps_total = 23;

    // Multi-vector dual-resolution index
    bool multi_vector_enabled = 24;
    uint32 coarse_dimension = 25;
    uint32 fine_dimension = 26;
    uint64 coarse_index_vectors = 27;
    uint64 fine_index_vectors = 28;
}

// ============================================================================
// File Content (Swarm)
// ============================================================================

message FileContentRequest {
    string repo_id = 1;      // Repository identifier
    string file_path = 2;    // Path within the repository
    string ref = 3;          // Git ref (branch, tag, commit); empty = HEAD
}

message FileContentResponse {
    string content = 1;      // File content (UTF-8 text)
    string encoding = 2;     // "utf-8" or "base64" for binary files
    bool is_binary = 3;      // True if file was detected as binary
}

// ============================================================================
// Asset Ingestion (Documents, PDFs, Images, Audio, URLs)
// ============================================================================

// Asset modality for typed routing to the correct embedding model.
enum AssetType {
    ASSET_TYPE_UNKNOWN  = 0;
    ASSET_TYPE_CODE     = 1;
    ASSET_TYPE_PDF      = 2;
    ASSET_TYPE_IMAGE    = 3;
    ASSET_TYPE_AUDIO    = 4;
    ASSET_TYPE_VIDEO    = 5;
    ASSET_TYPE_WEBPAGE  = 6;
    ASSET_TYPE_DOCUMENT = 7;
}

message IngestAssetRequest {
    string repo_id = 1;                    // Repository to embed into
    string source_url = 2;                 // Original URL (for metadata)
    string content = 3;                    // Extracted text content to embed
    string asset_type = 4;                 // Legacy string type ("document", "pdf", "url")
    map<string, string> metadata = 5;      // Additional metadata tags
    bytes binary_data = 6;                 // Raw binary data (image pixels, audio PCM)
    string mime_type = 7;                  // MIME type ("image/png", "audio/wav", etc.)
    AssetType typed_asset_type = 8;        // Typed enum (preferred over string field 4)
    string file_name = 9;                  // Original file name
}

message IngestAssetResponse {
    int32 chunks_created = 1;              // Number of chunks created
    string status = 2;                     // "ok" or error description
    AssetType detected_type = 3;           // Detected/used asset type
    string asset_id = 4;                   // Unique asset identifier for future reference
}

// ============================================================================
// Multimodal Embedding Configuration
// ============================================================================

// Per-modality model configuration.
message ModalityModelConfig {
    string modality = 1;                   // "text", "image", "audio"
    string model_name = 2;                 // "bge-m3", "siglip-base", "clap-general"
    string backend = 3;                    // "onnx", "http"
    uint32 dimension = 4;                  // Native output dimension
    uint32 projected_dimension = 5;        // Dimension after projection (unified space)
    bool enabled = 6;                      // Whether this modality is active
    string status = 7;                     // "ready", "downloading", "not_installed"
    int32 download_progress = 8;           // 0-100 if downloading
}

// Request to get or configure multimodal embedding models.
message GetMultimodalConfigRequest {}

message GetMultimodalConfigResponse {
    repeated ModalityModelConfig modalities = 1;
    uint32 unified_dimension = 2;          // All modalities project to this dim
    bool image_enabled = 3;
    bool audio_enabled = 4;
}

message ConfigureMultimodalRequest {
    bool enable_image = 1;                 // Enable/disable image embedding
    bool enable_audio = 2;                 // Enable/disable audio embedding
    string image_model = 3;               // Override image model (default: siglip-base)
    string audio_model = 4;               // Override audio model (default: clap-general)
}

message ConfigureMultimodalResponse {
    bool success = 1;
    string message = 2;
    repeated string loaded_models = 3;     // e.g. ["text:bge-m3", "image:siglip-base"]
}

// Model download progress (streamed during on-demand model downloads).
message ModelDownloadProgress {
    string model_name = 1;
    int32 progress = 2;                    // 0-100
    string phase = 3;                      // "downloading", "extracting", "loading", "ready"
    uint64 bytes_downloaded = 4;
    uint64 bytes_total = 5;
    bool done = 6;
    bool success = 7;
    string error = 8;
}

// ============================================================================
// Cross-Repo Service
//
// A SEPARATE service for all cross-repo operations. This is intentionally NOT
// added to EngineService to maintain single-repo isolation guarantees.
// The Go server handles authorization via crossrepo.Authorizer BEFORE calling
// any of these RPCs.
// ============================================================================

service CrossRepoService {
    // Dependency Graph ─────────────────────────────────────────

    // GetRepoManifest returns the structural manifest for a single repo
    // (build system, primary language, modules, repo type). The engine already
    // computes this during indexing; this RPC exposes it read-only.
    rpc GetRepoManifest(RepoManifestRequest) returns (RepoManifestResponse);

    // GetCrossRepoDependencies resolves inter-repo import/dependency edges.
    // Given a source repo, returns all symbols or packages that reference
    // artifacts belonging to other repos in the same org.
    rpc GetCrossRepoDependencies(CrossRepoDepsRequest) returns (CrossRepoDepsResponse);

    // BuildDependencyGraph constructs the full org-level dependency graph
    // across all linked repos. Heavy operation — intended for background jobs.
    rpc BuildDependencyGraph(BuildDepGraphRequest) returns (BuildDepGraphResponse);

    // Federated Search ─────────────────────────────────────────

    // FederatedSearch fans out a query across multiple repo indices and returns
    // merged, score-normalized results. The Go server pre-filters the target
    // repo list through crossrepo.Authorizer. This is a SEPARATE RPC from
    // EngineService.Search which operates on a single repo.
    rpc FederatedSearch(FederatedSearchRequest) returns (FederatedSearchResponse);

    // FederatedSearchStream is the streaming variant of FederatedSearch.
    // Chunks are streamed as they are found across repos, ordered by score.
    rpc FederatedSearchStream(FederatedSearchRequest) returns (stream FederatedContextChunk);
}

// ============================================================================
// Cross-Repo: Manifest Messages
// ============================================================================

message RepoManifestRequest {
    string repo_id = 1;
}

message RepoManifestResponse {
    bool found = 1;
    RepoManifestProto manifest = 2;
}

// Mirrors the C++ RepoManifest struct from hierarchy_builder.h.
message RepoManifestProto {
    string repo_id = 1;
    string repo_root = 2;
    string primary_language = 3;
    string build_system = 4;
    RepoType repo_type = 5;
    repeated BuildTargetProto targets = 6;
    map<string, ModuleFiles> module_to_files = 7;
}

message BuildTargetProto {
    string name = 1;
    string type = 2;         // "library", "executable", "module", "image", "package"
    repeated string source_globs = 3;
}

// Wrapper for repeated strings inside a map value.
message ModuleFiles {
    repeated string files = 1;
}

// ============================================================================
// Cross-Repo: Dependency Graph Messages
// ============================================================================

message CrossRepoDepsRequest {
    string source_repo_id = 1;
    // Optionally restrict to specific target repos (empty = check all linked).
    repeated string target_repo_ids = 2;
    // Maximum dependency depth (0 = direct only, 1 = transitive one hop, etc.).
    uint32 max_depth = 3;
}

message CrossRepoDepsResponse {
    repeated CrossRepoDependency dependencies = 1;
    uint32 total_edges = 2;
}

// A single cross-repo dependency edge.
message CrossRepoDependency {
    string source_repo_id = 1;
    string source_file = 2;           // Relative file path in source repo
    string source_symbol = 3;         // Import/require statement or symbol name
    string target_repo_id = 4;
    string target_file = 5;           // Resolved file in target repo (may be empty)
    string target_symbol = 6;         // Resolved symbol in target repo
    string dependency_type = 7;       // "import", "package", "submodule", "api_call"
    float confidence = 8;             // 0.0-1.0 match confidence
}

message BuildDepGraphRequest {
    string org_id = 1;
    // Repo IDs to include in the graph (empty = all linked repos in org).
    repeated string repo_ids = 2;
    // Whether to re-scan all repos or use cached manifests.
    bool force_rescan = 3;
}

message BuildDepGraphResponse {
    bool success = 1;
    string message = 2;
    uint32 repos_scanned = 3;
    uint32 total_nodes = 4;           // repos + modules
    uint32 total_edges = 5;           // dependency edges
    repeated DepGraphNode nodes = 6;
    repeated DepGraphEdge edges = 7;
}

// A node in the org-level dependency graph.
message DepGraphNode {
    string id = 1;                    // Unique node ID
    string repo_id = 2;
    string label = 3;                 // Repo name or module name
    string node_type = 4;             // "repo", "module", "package"
    string language = 5;
    RepoType repo_type = 6;
    map<string, string> metadata = 7;
}

// An edge in the org-level dependency graph.
message DepGraphEdge {
    string source_node_id = 1;
    string target_node_id = 2;
    string edge_type = 3;             // "depends_on", "imports", "submodule_of"
    float weight = 4;                 // Edge strength (number of references)
    map<string, string> metadata = 5;
}

// ============================================================================
// Cross-Repo: Federated Search Messages
// ============================================================================

message FederatedSearchRequest {
    // The query text.
    string query = 1;
    // Repo IDs to search across. The Go server has already filtered these
    // through crossrepo.Authorizer — the engine trusts this list.
    repeated string repo_ids = 2;
    // Optional symbols from the current diff context.
    repeated string touched_symbols = 3;
    // Search configuration (applied to each repo's index).
    SearchConfig config = 4;
    // Maximum total results across all repos.
    uint32 max_total_results = 5;
    // Concurrency budget: max repos to search in parallel (0 = engine default).
    uint32 max_concurrent = 6;
    // Score normalization strategy: "min_max", "z_score", "none".
    string score_normalization = 7;
}

message FederatedSearchResponse {
    repeated FederatedContextChunk chunks = 1;
    FederatedSearchMetrics metrics = 2;
}

// A context chunk with repo attribution.
message FederatedContextChunk {
    string repo_id = 1;              // Which repo this chunk came from
    string repo_name = 2;            // Human-readable repo name
    ContextChunk chunk = 3;          // The actual content
    float normalized_score = 4;      // Score after cross-repo normalization
    float raw_score = 5;             // Original per-repo score
}

message FederatedSearchMetrics {
    uint32 repos_searched = 1;
    uint32 repos_failed = 2;         // Repos where search errored (partial results)
    uint32 total_candidates = 3;     // Sum across all repos
    uint64 total_search_time_ms = 4; // Wall-clock time for the entire fan-out
    map<string, uint64> per_repo_time_ms = 5;   // Per-repo search latency
    map<string, uint32> per_repo_results = 6;   // Per-repo result count
    string normalization_used = 7;   // Which normalization was applied
}
