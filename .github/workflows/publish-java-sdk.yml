name: Publish Java SDK to Maven Central

on:
  push:
    tags:
      - 'java-sdk-v*'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: mono/sdks/java

jobs:
  test:
    name: Test Java SDK (Java ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['17', '21']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}
          cache: 'maven'
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#java-sdk-v}"
          echo "SDK_VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Run tests with coverage
        run: mvn -B test -Drevision=${{ env.SDK_VERSION || '0.0.0' }}
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() && matrix.java-version == '17'
        with:
          name: java-sdk-test-results
          path: mono/sdks/java/target/surefire-reports/
          retention-days: 7

  publish:
    name: Publish to Maven Central
    needs: test
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#java-sdk-v}"
          echo "SDK_VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Build & deploy
        run: mvn -B deploy -P release -Drevision=${{ env.SDK_VERSION }}
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
