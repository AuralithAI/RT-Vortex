name: Publish Node.js SDK to npm

on:
  push:
    tags:
      - 'node-sdk-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

defaults:
  run:
    working-directory: mono/sdks/node

jobs:
  test:
    name: Test Node.js SDK (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '20'
        with:
          name: node-sdk-coverage
          path: mono/sdks/node/coverage/
          retention-days: 7

  build:
    name: Build package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#node-sdk-v}"
          npm version "${VERSION}" --no-git-tag-version
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: node-sdk-dist
          path: |
            mono/sdks/node/dist/
            mono/sdks/node/package.json

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#node-sdk-v}"
          npm version "${VERSION}" --no-git-tag-version
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
