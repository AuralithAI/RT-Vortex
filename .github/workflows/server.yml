name: Server

# Go Server CI Pipeline
# Handles server-only build, test, lint, security scanning,
# and Docker image build for the Go API server.
#
# For full integration tests (Engine + Server), see ci.yml.

on:
  push:
    branches: ['**']
    paths:
      - 'mono/server-go/**'
      - 'mono/proto/**'
      - 'mono/schemas/**'
      - '.github/workflows/server.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mono/server-go/**'
      - 'mono/proto/**'
      - 'mono/schemas/**'
      - '.github/workflows/server.yml'

concurrency:
  group: server-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rtvortex-server

jobs:
  # ===========================================================================
  # Static Analysis
  # ===========================================================================
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mono/server-go

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: mono/server-go/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: mono/server-go
          args: --timeout=5m

      - name: Go vet
        run: go vet ./...

      - name: Check module tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || \
            (echo "go.mod or go.sum is out of date. Run 'go mod tidy' and commit." && exit 1)

      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted:"
            echo "$UNFORMATTED"
            echo "Run 'gofmt -w .' and commit."
            exit 1
          fi

  # ===========================================================================
  # Build & Test
  # ===========================================================================
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: mono/server-go

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rtvortex
          POSTGRES_PASSWORD: rtvortex
          POSTGRES_DB: rtvortex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: mono/server-go/go.sum

      - name: Download Dependencies
        run: go mod download

      - name: Build
        run: |
          go build -v -trimpath \
            -ldflags="-s -w \
              -X main.version=$(cat ../../mono/VERSION 2>/dev/null || echo dev) \
              -X main.commit=${{ github.sha }}" \
            ./cmd/rtvortex-server/

      - name: Run Unit Tests
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic \
            -count=1 -timeout=5m ./...
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: "5432"
          DATABASE_NAME: rtvortex_test
          DATABASE_USER: rtvortex
          DATABASE_PASSWORD: rtvortex
          REDIS_HOST: localhost
          REDIS_PORT: "6379"

      - name: Coverage Summary
        if: always()
        run: |
          if [ -f coverage.out ]; then
            TOTAL=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}')
            echo "### Go Server Coverage: ${TOTAL}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Per-package breakdown</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            go tool cover -func=coverage.out >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-coverage
          path: mono/server-go/coverage.out
          retention-days: 7

  # ===========================================================================
  # Security Scanning
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: mono/server-go

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: mono/server-go/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Check for known vulnerable dependencies
        run: |
          echo "### Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if govulncheck ./... 2>&1 | grep -q "No vulnerabilities found"; then
            echo "No known vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          else
            echo "Vulnerability scan completed. Review output above." >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # Docker Build
  # ===========================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mono/deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}

  # ===========================================================================
  # Quality Gate (PR only)
  # ===========================================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.event_name == 'pull_request'

    steps:
      - name: Download Coverage
        uses: actions/download-artifact@v4
        with:
          name: server-coverage
          path: coverage
        continue-on-error: true

      - name: Quality Summary
        run: |
          echo "# Server Quality Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Formatting | ${{ needs.lint.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
