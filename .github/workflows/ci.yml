name: CI

# Integration CI Pipeline
# This workflow orchestrates both Engine (C++) and Server (Java) builds,
# and runs full integration tests with both components.
#
# For component-specific builds, see:
#   - engine.yml (C++ engine only)
#   - server.yml (Java server only)

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  CMAKE_VERSION: "3.28.1"
  MONO_DIR: "mono"

jobs:
  # ===========================================================================
  # Determine what changed
  # ===========================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      engine: ${{ steps.changes.outputs.engine }}
      server: ${{ steps.changes.outputs.server }}
      config: ${{ steps.changes.outputs.config }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            engine:
              - 'mono/engine/**'
              - 'mono/proto/engine.proto'
            server:
              - 'mono/server/**'
              - 'mono/proto-java/**'
              - 'mono/build.gradle'
            config:
              - 'mono/config/**'
              - 'mono/schemas/**'

  # ===========================================================================
  # Lint & Validation (always runs)
  # ===========================================================================
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
      
      - name: Checkstyle
        working-directory: ${{ env.MONO_DIR }}
        run: |
          chmod +x gradlew
          ./gradlew checkstyleMain checkstyleTest || true
      
      - name: Validate YAML configs
        run: |
          pip install pyyaml
          for config in ${{ env.MONO_DIR }}/config/*.yml ${{ env.MONO_DIR }}/config/model-providers/*.yml; do
            if [ -f "$config" ]; then
              echo "Validating $config..."
              python3 -c "import yaml; yaml.safe_load(open('$config'))"
            fi
          done
      
      - name: Validate JSON schemas
        run: |
          npm install -g ajv-cli ajv-formats
          for schema in ${{ env.MONO_DIR }}/schemas/*.schema.json; do
            if [ -f "$schema" ]; then
              echo "Validating $schema..."
              ajv compile -s "$schema" --strict=true || true
            fi
          done

  # ===========================================================================
  # Build & Test Server (Java only - no C++ engine dependency for unit tests)
  # ===========================================================================
  server:
    name: Build & Test Server
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: ${{ needs.changes.outputs.server == 'true' || github.event_name == 'push' }}
    defaults:
      run:
        working-directory: ${{ env.MONO_DIR }}
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aipr
          POSTGRES_PASSWORD: aipr
          POSTGRES_DB: aipr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
      
      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew
      
      - name: Build
        run: ./gradlew build -x test
      
      - name: Run Tests with Coverage
        run: ./gradlew test jacocoTestReport
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/aipr_test
          DATABASE_USER: aipr
          DATABASE_PASSWORD: aipr
          REDIS_HOST: localhost
          REDIS_PORT: 6379
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.MONO_DIR }}/server/build/reports/jacoco/
          retention-days: ${{ github.ref == 'refs/heads/main' && 30 || 1 }}
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ${{ env.MONO_DIR }}/server/build/test-results/
          retention-days: ${{ github.ref == 'refs/heads/main' && 30 || 1 }}
      
      - name: Coverage Summary
        id: coverage
        run: |
          echo "## 📊 Java Server Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Parse test results
          TEST_RESULTS_DIR="server/build/test-results/test"
          if [ -d "$TEST_RESULTS_DIR" ]; then
            TESTS_RUN=$(find $TEST_RESULTS_DIR -name "*.xml" -exec grep -h "tests=" {} \; | grep -oP 'tests="\K[0-9]+' | awk '{sum+=$1} END {print sum}')
            TESTS_FAILED=$(find $TEST_RESULTS_DIR -name "*.xml" -exec grep -h "failures=" {} \; | grep -oP 'failures="\K[0-9]+' | awk '{sum+=$1} END {print sum}')
            TESTS_ERRORS=$(find $TEST_RESULTS_DIR -name "*.xml" -exec grep -h "errors=" {} \; | grep -oP 'errors="\K[0-9]+' | awk '{sum+=$1} END {print sum}')
            TESTS_SKIPPED=$(find $TEST_RESULTS_DIR -name "*.xml" -exec grep -h "skipped=" {} \; | grep -oP 'skipped="\K[0-9]+' | awk '{sum+=$1} END {print sum}')
            TESTS_PASSED=$((TESTS_RUN - TESTS_FAILED - TESTS_ERRORS - TESTS_SKIPPED))
            
            echo "### ✅ Test Results" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | ${TESTS_RUN:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | ${TESTS_PASSED:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | ${TESTS_FAILED:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| ⚠️ Errors | ${TESTS_ERRORS:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭️ Skipped | ${TESTS_SKIPPED:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Set outputs for quality gate
            echo "tests_run=${TESTS_RUN:-0}" >> $GITHUB_OUTPUT
            echo "tests_passed=${TESTS_PASSED:-0}" >> $GITHUB_OUTPUT
            echo "tests_failed=${TESTS_FAILED:-0}" >> $GITHUB_OUTPUT
          fi
          
          # Parse JaCoCo coverage from XML
          JACOCO_XML="server/build/reports/jacoco/test/jacocoTestReport.xml"
          if [ -f "$JACOCO_XML" ]; then
            # Extract instruction coverage
            COVERED=$(grep -oP 'type="INSTRUCTION" missed="\d+" covered="\K\d+' "$JACOCO_XML" | head -1)
            MISSED=$(grep -oP 'type="INSTRUCTION" missed="\K\d+' "$JACOCO_XML" | head -1)
            
            if [ -n "$COVERED" ] && [ -n "$MISSED" ]; then
              TOTAL=$((COVERED + MISSED))
              if [ $TOTAL -gt 0 ]; then
                COVERAGE_PCT=$(awk "BEGIN {printf \"%.1f\", ($COVERED / $TOTAL) * 100}")
              else
                COVERAGE_PCT="0.0"
              fi
            else
              COVERAGE_PCT="N/A"
            fi
            
            # Extract line coverage
            LINE_COVERED=$(grep -oP 'type="LINE" missed="\d+" covered="\K\d+' "$JACOCO_XML" | head -1)
            LINE_MISSED=$(grep -oP 'type="LINE" missed="\K\d+' "$JACOCO_XML" | head -1)
            
            if [ -n "$LINE_COVERED" ] && [ -n "$LINE_MISSED" ]; then
              LINE_TOTAL=$((LINE_COVERED + LINE_MISSED))
              if [ $LINE_TOTAL -gt 0 ]; then
                LINE_COVERAGE_PCT=$(awk "BEGIN {printf \"%.1f\", ($LINE_COVERED / $LINE_TOTAL) * 100}")
              else
                LINE_COVERAGE_PCT="0.0"
              fi
            else
              LINE_COVERAGE_PCT="N/A"
            fi
            
            # Extract branch coverage
            BRANCH_COVERED=$(grep -oP 'type="BRANCH" missed="\d+" covered="\K\d+' "$JACOCO_XML" | head -1)
            BRANCH_MISSED=$(grep -oP 'type="BRANCH" missed="\K\d+' "$JACOCO_XML" | head -1)
            
            if [ -n "$BRANCH_COVERED" ] && [ -n "$BRANCH_MISSED" ]; then
              BRANCH_TOTAL=$((BRANCH_COVERED + BRANCH_MISSED))
              if [ $BRANCH_TOTAL -gt 0 ]; then
                BRANCH_COVERAGE_PCT=$(awk "BEGIN {printf \"%.1f\", ($BRANCH_COVERED / $BRANCH_TOTAL) * 100}")
              else
                BRANCH_COVERAGE_PCT="0.0"
              fi
            else
              BRANCH_COVERAGE_PCT="N/A"
            fi
            
            echo "### 📈 Code Coverage" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
            echo "| Instruction Coverage | ${COVERAGE_PCT}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Line Coverage | ${LINE_COVERAGE_PCT}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Branch Coverage | ${BRANCH_COVERAGE_PCT}% |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Set output for quality gate
            echo "coverage=${COVERAGE_PCT}" >> $GITHUB_OUTPUT
            echo "line_coverage=${LINE_COVERAGE_PCT}" >> $GITHUB_OUTPUT
            echo "branch_coverage=${BRANCH_COVERAGE_PCT}" >> $GITHUB_OUTPUT
          else
            echo "⚠️ JaCoCo coverage report not found" >> $GITHUB_STEP_SUMMARY
            echo "coverage=0" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Build C++ Engine (gRPC Server)
  # The engine is now a standalone gRPC server executable.
  # ===========================================================================
  engine:
    name: Build Engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [lint, changes]
    if: ${{ needs.changes.outputs.engine == 'true' || github.event_name == 'push' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: aipr-engine-linux-x64
          - os: macos-latest
            artifact: aipr-engine-darwin-x64
          - os: windows-latest
            artifact: aipr-engine-windows-x64
    
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
          key: vcpkg-windows-x64-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            vcpkg-windows-x64-

      - name: Cache FAISS build (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\faiss-install
          key: faiss-windows-x64-v1.7.4
          restore-keys: |
            faiss-windows-x64-v1.7.4
      
      - name: Install Dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libomp-dev libopenblas-dev liblapack-dev libgflags-dev

      - name: Build FAISS from source (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          # Check if FAISS is already installed
          if ldconfig -p | grep -q libfaiss; then
            echo "FAISS already installed, skipping build"
            exit 0
          fi
          
          git clone --depth 1 --branch v1.7.4 https://github.com/facebookresearch/faiss.git /tmp/faiss
          cd /tmp/faiss
          mkdir build && cd build
          cmake .. \
            -DFAISS_ENABLE_GPU=OFF \
            -DFAISS_ENABLE_PYTHON=OFF \
            -DFAISS_ENABLE_C_API=ON \
            -DBUILD_TESTING=OFF \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DBLA_VENDOR=OpenBLAS
          cmake --build . --config Release --parallel 4
          sudo cmake --install . --config Release
          sudo ldconfig
      
      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libomp openblas faiss
          echo "OpenBLAS_HOME=$(brew --prefix openblas)" >> $GITHUB_ENV
          echo "OpenMP_ROOT=$(brew --prefix libomp)" >> $GITHUB_ENV
      
      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install curl:x64-windows openblas:x64-windows
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows

      - name: Build FAISS from source (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Check if FAISS is already installed (from cache)
          if (Test-Path "C:\faiss-install\lib\faiss.lib") {
            Write-Host "FAISS already installed, skipping build"
            exit 0
          }
          
          git clone --depth 1 --branch v1.7.4 https://github.com/facebookresearch/faiss.git C:\faiss
          cd C:\faiss
          mkdir build
          cd build
          cmake .. `
            -DFAISS_ENABLE_GPU=OFF `
            -DFAISS_ENABLE_PYTHON=OFF `
            -DFAISS_ENABLE_C_API=ON `
            -DBUILD_TESTING=OFF `
            -DBUILD_SHARED_LIBS=ON `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build . --config Release --parallel 4
          cmake --install . --config Release --prefix C:\faiss-install
          echo "faiss_DIR=C:\faiss-install" >> $env:GITHUB_ENV
      
      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}
      
      - name: Configure & Build (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -S ${{ env.MONO_DIR }}/engine \
            -DCMAKE_BUILD_TYPE=Release \
            -DAIPR_BUILD_TESTS=ON \
            -DAIPR_BUILD_SERVER=ON \
            -DAIPR_USE_FAISS=ON \
            -DAIPR_USE_TREE_SITTER=ON
          cmake --build build --config Release --parallel 4
      
      - name: Configure & Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build -S ${{ env.MONO_DIR }}/engine `
            -DCMAKE_BUILD_TYPE=Release `
            -DAIPR_BUILD_TESTS=ON `
            -DAIPR_BUILD_SERVER=ON `
            -DAIPR_USE_FAISS=ON `
            -DAIPR_USE_TREE_SITTER=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="C:\faiss-install"
          cmake --build build --config Release --parallel 4
      
      - name: Run Tests
        run: ctest --test-dir build --output-on-failure -C Release
        continue-on-error: true
      
      - name: Package
        shell: bash
        run: |
          mkdir -p dist/bin dist/lib
          
          # Copy server executable (new gRPC server architecture)
          cp build/bin/aipr-engine dist/bin/ 2>/dev/null || true
          cp build/bin/Release/aipr-engine.exe dist/bin/ 2>/dev/null || true
          cp build/bin/aipr-engine.exe dist/bin/ 2>/dev/null || true
          
          # Copy libraries (for backward compat during transition)
          cp build/lib* dist/lib/ 2>/dev/null || true
          cp build/*.dll dist/lib/ 2>/dev/null || true
          cp build/*.dylib dist/lib/ 2>/dev/null || true
          cp build/*.so dist/lib/ 2>/dev/null || true
          cp build/Release/*.dll dist/lib/ 2>/dev/null || true
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          retention-days: ${{ github.ref == 'refs/heads/main' && 30 || 7 }}

  # ===========================================================================
  # Build Distribution Package
  # ===========================================================================
  distribution:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: [server, engine]
    if: always() && (needs.server.result == 'success' || needs.server.result == 'skipped') && (needs.engine.result == 'success' || needs.engine.result == 'skipped')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
      
      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew
        working-directory: ${{ env.MONO_DIR }}
      
      - name: Download Engine Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: aipr-engine-*
          path: ${{ env.MONO_DIR }}/engine/build/
          merge-multiple: true
      
      - name: Build Distribution
        working-directory: ${{ env.MONO_DIR }}
        run: ./gradlew distZip distTar
      
      - name: Upload Distribution (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: aipr-distribution-zip
          path: ${{ env.MONO_DIR }}/build/distributions/*.zip
          retention-days: ${{ github.ref == 'refs/heads/main' && 30 || 7 }}
      
      - name: Upload Distribution (TAR)
        uses: actions/upload-artifact@v4
        with:
          name: aipr-distribution-tar
          path: ${{ env.MONO_DIR }}/build/distributions/*.tar.gz
          retention-days: ${{ github.ref == 'refs/heads/main' && 30 || 7 }}

  # ===========================================================================
  # Integration Tests (Engine + Server together)
  # ===========================================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [server, engine]
    if: always() && needs.server.result == 'success' && needs.engine.result == 'success'
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aipr
          POSTGRES_PASSWORD: aipr
          POSTGRES_DB: aipr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Download Engine
        uses: actions/download-artifact@v4
        with:
          name: aipr-engine-linux-x64
          path: engine-dist/
      
      - name: Start Engine Server
        run: |
          chmod +x engine-dist/bin/aipr-engine
          
          # Start engine in background
          ENGINE_HOST=0.0.0.0 ENGINE_PORT=50051 ENGINE_TLS_ENABLED=false \
            engine-dist/bin/aipr-engine --port 50051 &
          
          echo "ENGINE_PID=$!" >> $GITHUB_ENV
          
          # Wait for startup
          sleep 5
          
          # Verify running
          if ! kill -0 $! 2>/dev/null; then
            echo "Engine failed to start"
            exit 1
          fi
          echo "Engine started on port 50051"
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
      
      - name: Run Integration Tests
        working-directory: ${{ env.MONO_DIR }}
        run: |
          chmod +x gradlew
          ./gradlew :server:integrationTest || true
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/aipr_test
          DATABASE_USER: aipr
          DATABASE_PASSWORD: aipr
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          ENGINE_HOST: localhost
          ENGINE_PORT: 50051
          ENGINE_NEGOTIATION: PLAINTEXT
      
      - name: Cleanup
        if: always()
        run: |
          if [ -n "$ENGINE_PID" ]; then
            kill $ENGINE_PID 2>/dev/null || true
          fi
      
      - name: Integration Test Summary
        if: always()
        run: |
          echo "# 🔗 Integration Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Components Tested" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ C++ Engine (gRPC Server on port 50051)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Java Server (connected via gRPC)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ PostgreSQL" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Redis" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # PR Quality Gate (only on PRs)
  # ===========================================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, server, engine]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage-report
        continue-on-error: true
      
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results
        continue-on-error: true
      
      - name: Generate Quality Gate Summary
        run: |
          echo "# 🚀 Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| ☕ Java Server | ${{ needs.server.result == 'success' && '✅ Passed' || needs.server.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚙️ C++ Engine (gRPC) | ${{ needs.engine.result == 'success' && '✅ Passed' || needs.engine.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚙️ C++ Engine | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Parse Java test results
          echo "## ☕ Java Server Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "test-results/test" ]; then
            TESTS_RUN=$(find test-results/test -name "*.xml" -exec grep -h "tests=" {} \; 2>/dev/null | grep -oP 'tests="\K[0-9]+' | awk '{sum+=$1} END {print sum+0}')
            TESTS_FAILED=$(find test-results/test -name "*.xml" -exec grep -h "failures=" {} \; 2>/dev/null | grep -oP 'failures="\K[0-9]+' | awk '{sum+=$1} END {print sum+0}')
            TESTS_ERRORS=$(find test-results/test -name "*.xml" -exec grep -h "errors=" {} \; 2>/dev/null | grep -oP 'errors="\K[0-9]+' | awk '{sum+=$1} END {print sum+0}')
            TESTS_PASSED=$((TESTS_RUN - TESTS_FAILED - TESTS_ERRORS))
            
            if [ "$TESTS_FAILED" -eq 0 ] && [ "$TESTS_ERRORS" -eq 0 ]; then
              TEST_STATUS="✅"
            else
              TEST_STATUS="❌"
            fi
            
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS_RUN |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $TESTS_PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $TESTS_FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | $TEST_STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Test results not available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Parse JaCoCo coverage
          echo "## 📈 Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          JACOCO_XML="coverage-report/test/jacocoTestReport.xml"
          if [ -f "$JACOCO_XML" ]; then
            # Extract instruction coverage
            COVERED=$(grep -oP 'type="INSTRUCTION" missed="\d+" covered="\K\d+' "$JACOCO_XML" | head -1)
            MISSED=$(grep -oP 'type="INSTRUCTION" missed="\K\d+' "$JACOCO_XML" | head -1)
            
            if [ -n "$COVERED" ] && [ -n "$MISSED" ]; then
              TOTAL=$((COVERED + MISSED))
              if [ $TOTAL -gt 0 ]; then
                COVERAGE_PCT=$(awk "BEGIN {printf \"%.1f\", ($COVERED / $TOTAL) * 100}")
              else
                COVERAGE_PCT="0.0"
              fi
            else
              COVERAGE_PCT="N/A"
            fi
            
            # Extract line coverage
            LINE_COVERED=$(grep -oP 'type="LINE" missed="\d+" covered="\K\d+' "$JACOCO_XML" | head -1)
            LINE_MISSED=$(grep -oP 'type="LINE" missed="\K\d+' "$JACOCO_XML" | head -1)
            
            if [ -n "$LINE_COVERED" ] && [ -n "$LINE_MISSED" ]; then
              LINE_TOTAL=$((LINE_COVERED + LINE_MISSED))
              if [ $LINE_TOTAL -gt 0 ]; then
                LINE_COVERAGE_PCT=$(awk "BEGIN {printf \"%.1f\", ($LINE_COVERED / $LINE_TOTAL) * 100}")
              else
                LINE_COVERAGE_PCT="0.0"
              fi
            else
              LINE_COVERAGE_PCT="N/A"
            fi
            
            # Determine coverage status (60% threshold)
            COVERAGE_NUM=$(echo "$COVERAGE_PCT" | grep -oP '[0-9.]+' || echo "0")
            if (( $(echo "$COVERAGE_NUM >= 60" | bc -l 2>/dev/null || echo "0") )); then
              COV_STATUS="✅"
            else
              COV_STATUS="⚠️"
            fi
            
            echo "| Metric | Coverage | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Instruction Coverage | ${COVERAGE_PCT}% | $COV_STATUS |" >> $GITHUB_STEP_SUMMARY
            echo "| Line Coverage | ${LINE_COVERAGE_PCT}% | |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> **Threshold:** 60% minimum coverage required" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage report not available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Final verdict
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎯 Final Verdict" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **All quality checks passed. PR is ready to merge.**" >> $GITHUB_STEP_SUMMARY
