name: CI

# Integration CI Pipeline
# Orchestrates both Engine (C++) and Server (Go) builds,
# and runs full integration tests with both components.
#
# For component-specific builds, see:
#   - engine.yml  (C++ engine only)
#   - server.yml  (Go server only)

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  CMAKE_VERSION: "3.28.1"
  MONO_DIR: "mono"

jobs:
  # ===========================================================================
  # Determine what changed
  # ===========================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      engine: ${{ steps.changes.outputs.engine }}
      server: ${{ steps.changes.outputs.server }}
      config: ${{ steps.changes.outputs.config }}
      cli: ${{ steps.changes.outputs.cli }}
      sdk-python: ${{ steps.changes.outputs.sdk-python }}
      sdk-node: ${{ steps.changes.outputs.sdk-node }}
      sdk-java: ${{ steps.changes.outputs.sdk-java }}
      web: ${{ steps.changes.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            engine:
              - 'mono/engine/**'
              - 'mono/proto/engine.proto'
            server:
              - 'mono/server-go/**'
              - '.github/workflows/server.yml'
            config:
              - 'mono/config/**'
              - 'mono/schemas/**'
            cli:
              - 'mono/cli/**'
            sdk-python:
              - 'mono/sdks/python/**'
            sdk-node:
              - 'mono/sdks/node/**'
            sdk-java:
              - 'mono/sdks/java/**'
            web:
              - 'mono/web/**'

  # ===========================================================================
  # Lint & Validation (always runs)
  # ===========================================================================
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.MONO_DIR }}/server-go/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: ${{ env.MONO_DIR }}/server-go
          args: --timeout=5m

      - name: Go vet
        working-directory: ${{ env.MONO_DIR }}/server-go
        run: go vet ./...

      - name: Validate YAML configs
        run: |
          pip install pyyaml
          for config in ${{ env.MONO_DIR }}/config/*.yml ${{ env.MONO_DIR }}/config/model-providers/*.yml; do
            if [ -f "$config" ]; then
              echo "Validating $config..."
              python3 -c "import yaml; yaml.safe_load(open('$config'))"
            fi
          done

      - name: Validate JSON schemas
        run: |
          npm install -g ajv-cli ajv-formats
          for schema in ${{ env.MONO_DIR }}/schemas/*.schema.json; do
            if [ -f "$schema" ]; then
              echo "Validating $schema..."
              ajv compile -s "$schema" --strict=true || true
            fi
          done

  # ===========================================================================
  # Build & Test Go Server
  # ===========================================================================
  server:
    name: Build & Test Server
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: ${{ needs.changes.outputs.server == 'true' || github.event_name == 'push' }}
    defaults:
      run:
        working-directory: ${{ env.MONO_DIR }}/server-go

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rtvortex
          POSTGRES_PASSWORD: rtvortex
          POSTGRES_DB: rtvortex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.MONO_DIR }}/server-go/go.sum

      - name: Build
        run: |
          go build -v -trimpath \
            -ldflags "-s -w \
              -X main.version=$(cat ../../${{ env.MONO_DIR }}/VERSION 2>/dev/null || echo dev) \
              -X main.commit=${{ github.sha }}" \
            ./cmd/rtvortex-server/

      - name: Run Tests with Coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic -count=1 -timeout=5m ./...
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: "5432"
          DATABASE_NAME: rtvortex_test
          DATABASE_USER: rtvortex
          DATABASE_PASSWORD: rtvortex
          REDIS_HOST: localhost
          REDIS_PORT: "6379"

      - name: Generate Coverage HTML
        run: go tool cover -html=coverage.out -o coverage.html
        if: always()

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-coverage-report
          path: |
            ${{ env.MONO_DIR }}/server-go/coverage.out
            ${{ env.MONO_DIR }}/server-go/coverage.html
          retention-days: ${{ github.ref == 'refs/heads/main' && 30 || 7 }}

      - name: Coverage Summary
        id: coverage
        if: always()
        run: |
          echo "## Go Server Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f coverage.out ]; then
            COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
            echo "### Code Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Per-package coverage</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            go tool cover -func=coverage.out >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY

            echo "coverage=${COVERAGE}" >> $GITHUB_OUTPUT
          else
            echo "Coverage report not found" >> $GITHUB_STEP_SUMMARY
            echo "coverage=0" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Build C++ Engine (gRPC Server)
  # ===========================================================================
  engine:
    name: Build Engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [lint, changes]
    if: ${{ needs.changes.outputs.engine == 'true' || github.event_name == 'push' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: rtvortex-engine-linux-x64
          - os: macos-latest
            artifact: rtvortex-engine-darwin-x64
          - os: windows-latest
            artifact: rtvortex-engine-windows-x64

    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake FetchContent deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ matrix.artifact }}-${{ hashFiles('mono/engine/CMakeLists.txt') }}
          restore-keys: |
            cmake-deps-${{ matrix.artifact }}-

      - name: Cache Homebrew packages (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar
            /usr/local/opt
            /opt/homebrew/Cellar
            /opt/homebrew/opt
          key: brew-${{ matrix.artifact }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            brew-${{ matrix.artifact }}-

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
          key: vcpkg-windows-x64-grpc-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            vcpkg-windows-x64-grpc-
            vcpkg-windows-x64-

      - name: Cache FAISS build (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\faiss-install
          key: faiss-windows-x64-v1.7.4
          restore-keys: |
            faiss-windows-x64-v1.7.4

      - name: Cache FAISS build (Ubuntu)
        if: runner.os == 'Linux'
        id: cache-faiss-linux
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/libfaiss*
            /usr/local/lib/cmake/faiss
            /usr/local/include/faiss
            /usr/local/share/faiss
          key: faiss-${{ matrix.artifact }}-v1.7.4-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            faiss-${{ matrix.artifact }}-v1.7.4-

      - name: Install Dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libcurl4-openssl-dev \
            libssl-dev \
            libomp-dev \
            libopenblas-dev \
            liblapack-dev \
            libgflags-dev

      - name: Build FAISS from source (Ubuntu)
        if: runner.os == 'Linux' && steps.cache-faiss-linux.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v1.7.4 https://github.com/facebookresearch/faiss.git /tmp/faiss
          cd /tmp/faiss && mkdir build && cd build
          cmake .. \
            -DFAISS_ENABLE_GPU=OFF \
            -DFAISS_ENABLE_PYTHON=OFF \
            -DFAISS_ENABLE_C_API=ON \
            -DBUILD_TESTING=OFF \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DBLA_VENDOR=OpenBLAS
          cmake --build . --config Release --parallel $(nproc)
          sudo cmake --install . --config Release
          sudo ldconfig
          rm -rf /tmp/faiss

      - name: Refresh ldconfig for cached FAISS (Ubuntu)
        if: runner.os == 'Linux' && steps.cache-faiss-linux.outputs.cache-hit == 'true'
        run: sudo ldconfig

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libomp openblas faiss protobuf grpc abseil
          echo "OpenBLAS_HOME=$(brew --prefix openblas)" >> $GITHUB_ENV
          echo "OpenMP_ROOT=$(brew --prefix libomp)" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$(brew --prefix)/lib/cmake:$(brew --prefix grpc)/lib/cmake:$(brew --prefix protobuf)/lib/cmake:$(brew --prefix abseil)/lib/cmake" >> $GITHUB_ENV

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install curl:x64-windows openblas:x64-windows --clean-after-build
          vcpkg install grpc:x64-windows protobuf:x64-windows --clean-after-build
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows

      - name: Build FAISS from source (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "C:\faiss-install\lib\faiss.lib") {
            Write-Host "FAISS already installed, skipping build"
            exit 0
          }
          git clone --depth 1 --branch v1.7.4 https://github.com/facebookresearch/faiss.git C:\faiss
          cd C:\faiss
          mkdir build && cd build
          cmake .. `
            -DFAISS_ENABLE_GPU=OFF `
            -DFAISS_ENABLE_PYTHON=OFF `
            -DFAISS_ENABLE_C_API=ON `
            -DBUILD_TESTING=OFF `
            -DBUILD_SHARED_LIBS=ON `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build . --config Release --parallel 4
          cmake --install . --config Release --prefix C:\faiss-install
          echo "faiss_DIR=C:\faiss-install" >> $env:GITHUB_ENV
          cd C:\
          Remove-Item -Recurse -Force C:\faiss -ErrorAction SilentlyContinue

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}

      - name: Configure & Build (Unix)
        if: runner.os != 'Windows'
        run: |
          CMAKE_EXTRA_ARGS=""
          if [ -n "$CMAKE_PREFIX_PATH" ]; then
            CMAKE_EXTRA_ARGS="-DCMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH"
          fi
          cmake -B build -S ${{ env.MONO_DIR }}/engine \
            -DCMAKE_BUILD_TYPE=Release \
            -DAIPR_BUILD_TESTS=ON \
            -DAIPR_BUILD_SERVER=ON \
            -DAIPR_USE_FAISS=ON \
            -DAIPR_USE_TREE_SITTER=ON \
            $CMAKE_EXTRA_ARGS
          cmake --build build --config Release --parallel 4

      - name: Configure & Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build -S ${{ env.MONO_DIR }}/engine `
            -DCMAKE_BUILD_TYPE=Release `
            -DAIPR_BUILD_TESTS=ON `
            -DAIPR_BUILD_SERVER=ON `
            -DAIPR_USE_FAISS=ON `
            -DAIPR_USE_TREE_SITTER=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="C:\faiss-install"
          cmake --build build --config Release --parallel 4

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure -C Release
        continue-on-error: true

      - name: Package
        shell: bash
        run: |
          mkdir -p dist/bin dist/lib dist/models/minilm dist/config
          cp build/bin/rtvortex dist/bin/ 2>/dev/null || true
          cp build/bin/Release/rtvortex.exe dist/bin/ 2>/dev/null || true
          cp build/bin/rtvortex.exe dist/bin/ 2>/dev/null || true
          cp build/lib/*.so dist/lib/ 2>/dev/null || true
          cp build/lib/*.dll dist/lib/ 2>/dev/null || true
          cp build/lib/*.dylib dist/lib/ 2>/dev/null || true
          cp build/lib/Release/*.dll dist/lib/ 2>/dev/null || true
          # Bundle ONNX Runtime shared library
          cp build/_deps/onnxruntime-src/lib/libonnxruntime* dist/lib/ 2>/dev/null || true
          cp build/_deps/onnxruntime-src/lib/onnxruntime.dll dist/lib/ 2>/dev/null || true
          # Bundle MiniLM model (subdirectory layout)
          cp build/models/minilm/model.onnx dist/models/minilm/ 2>/dev/null || true
          cp build/models/minilm/tokenizer.json dist/models/minilm/ 2>/dev/null || true
          cp build/models/minilm/vocab.txt dist/models/minilm/ 2>/dev/null || true
          # Bundle config files (matches Makefile config target)
          cp -r ${{ env.MONO_DIR }}/config/* dist/config/ 2>/dev/null || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          retention-days: ${{ github.ref == 'refs/heads/main' && 30 || 7 }}

  # ===========================================================================
  # CLI Tests
  # ===========================================================================
  cli:
    name: Test CLI (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.cli == 'true' || github.event_name == 'push' }}
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        working-directory: ${{ env.MONO_DIR }}/cli
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=rtvortex_cli \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml
        working-directory: ${{ env.MONO_DIR }}/cli
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: cli-coverage
          path: ${{ env.MONO_DIR }}/cli/coverage.xml
          retention-days: 7

  # ===========================================================================
  # Python SDK Tests
  # ===========================================================================
  sdk-python:
    name: Test Python SDK (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.sdk-python == 'true' || github.event_name == 'push' }}
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        working-directory: ${{ env.MONO_DIR }}/sdks/python
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=rtvortex_sdk \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml
        working-directory: ${{ env.MONO_DIR }}/sdks/python
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: python-sdk-coverage
          path: ${{ env.MONO_DIR }}/sdks/python/coverage.xml
          retention-days: 7

  # ===========================================================================
  # Node.js SDK Tests
  # ===========================================================================
  sdk-node:
    name: Test Node.js SDK (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.sdk-node == 'true' || github.event_name == 'push' }}
    strategy:
      matrix:
        node-version: ['18', '20']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.MONO_DIR }}/sdks/node
      - name: Type check
        run: npm run typecheck
        working-directory: ${{ env.MONO_DIR }}/sdks/node
      - name: Run tests
        run: npm test
        working-directory: ${{ env.MONO_DIR }}/sdks/node

  # ===========================================================================
  # Java SDK Tests
  # ===========================================================================
  sdk-java:
    name: Test Java SDK (Java ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.sdk-java == 'true' || github.event_name == 'push' }}
    strategy:
      matrix:
        java-version: ['17', '21']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}
          cache: 'maven'
      - name: Run tests
        run: mvn -B test -Drevision=0.0.0-ci
        working-directory: ${{ env.MONO_DIR }}/sdks/java
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() && matrix.java-version == '17'
        with:
          name: java-sdk-test-results
          path: ${{ env.MONO_DIR }}/sdks/java/target/surefire-reports/
          retention-days: 7

  # ===========================================================================
  # Web UI Tests (Next.js)
  # ===========================================================================
  web:
    name: Build & Test Web UI (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.web == 'true' || github.event_name == 'push' }}
    strategy:
      matrix:
        node-version: ['20']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ env.MONO_DIR }}/web/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ${{ env.MONO_DIR }}/web
      - name: Lint
        run: npm run lint
        working-directory: ${{ env.MONO_DIR }}/web
        continue-on-error: true
      - name: Run tests
        run: npm test
        working-directory: ${{ env.MONO_DIR }}/web
      - name: Build
        run: npm run build
        working-directory: ${{ env.MONO_DIR }}/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ===========================================================================
  # Integration Tests (Engine + Server together)
  # ===========================================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [server, engine]
    if: always() && needs.server.result == 'success' && needs.engine.result == 'success'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rtvortex
          POSTGRES_PASSWORD: rtvortex
          POSTGRES_DB: rtvortex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.MONO_DIR }}/server-go/go.sum

      - name: Download Engine
        uses: actions/download-artifact@v4
        with:
          name: rtvortex-engine-linux-x64
          path: engine-dist/

      - name: Start Engine Server
        run: |
          chmod +x engine-dist/bin/rtvortex

          export LD_LIBRARY_PATH="${GITHUB_WORKSPACE}/engine-dist/lib:${LD_LIBRARY_PATH}"
          export RTVORTEX_HOME="${GITHUB_WORKSPACE}/engine-dist"

          ENGINE_HOST=0.0.0.0 ENGINE_PORT=50051 ENGINE_TLS_ENABLED=false \
            engine-dist/bin/rtvortex --port 50051 &

          echo "ENGINE_PID=$!" >> $GITHUB_ENV

          # Wait for startup
          for i in $(seq 1 30); do
            if nc -z localhost 50051 2>/dev/null; then
              echo "Engine started on port 50051"
              break
            fi
            sleep 1
          done

      - name: Run Integration Tests
        working-directory: ${{ env.MONO_DIR }}/server-go
        run: |
          go test -race -tags=integration -count=1 -timeout=5m ./...
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: "5432"
          DATABASE_NAME: rtvortex_test
          DATABASE_USER: rtvortex
          DATABASE_PASSWORD: rtvortex
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          ENGINE_HOST: localhost
          ENGINE_PORT: "50051"
          ENGINE_NEGOTIATION: PLAINTEXT

      - name: Cleanup
        if: always()
        run: |
          if [ -n "$ENGINE_PID" ]; then
            kill $ENGINE_PID 2>/dev/null || true
          fi

      - name: Integration Test Summary
        if: always()
        run: |
          echo "# Integration Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Components Tested" >> $GITHUB_STEP_SUMMARY
          echo "- C++ Engine (gRPC Server on port 50051)" >> $GITHUB_STEP_SUMMARY
          echo "- Go API Server (connected via gRPC)" >> $GITHUB_STEP_SUMMARY
          echo "- PostgreSQL" >> $GITHUB_STEP_SUMMARY
          echo "- Redis" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # PR Quality Gate (only on PRs)
  # ===========================================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, server, engine, cli, sdk-python, sdk-node, sdk-java, web]
    if: github.event_name == 'pull_request'

    steps:
      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: go-coverage-report
          path: coverage-report
        continue-on-error: true

      - name: Generate Quality Gate Summary
        run: |
          echo "# Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
